<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #ffffff; }
    .icon { fill: #0066cc; }
    .accent { fill: #1a1a1a; }
    
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1a1a1a; }
      .icon { fill: #4d9fff; }
      .accent { fill: #ffffff; }
    }
  </style>
  
  <!-- Background circle -->
  <circle class="bg" cx="16" cy="16" r="16"/>
  
  <!-- Main icon shape -->
  <path class="icon" d="M16 6l8 14H8z"/>
  
  <!-- Accent details -->
  <circle class="accent" cx="16" cy="14" r="2"/>
</svg>